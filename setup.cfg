[metadata]
# 项目元数据
name = xiaoyao
author = 深圳果力智能科技有限公司
author_email = csi@glitech.com
description = 枭尧灵巧手 Python SDK
long_description = file: README.md  # 从 README.md 读取长描述
long_description_content_type = text/markdown
url = https://github.com/YourGitHubOrg/Xiaoyao-SDK
license = MIT  # 指定许可证类型
license_files = LICENSE  # 指定包含许可证文本的文件

[options]
# 打包选项
packages = find:
python_requires = >=3.9
install_requires =
    pysoem
    netifaces
    setuptools
    sphinx

[options.packages.find]
# 告诉 find: 在哪里查找包
where = src/xiaoyao