[metadata]
# 项目元数据
name = xiaoyao
version = attr: src.xiaoyao.version.__version__  # 动态从 version.py 获取版本号
author = 深圳果力智能科技有限公司
author_email = contact@guoli-intelligent.com
description = 枭尧灵巧手 (Xiaoyao Hand) 官方 Python SDK
long_description = file: README.md  # 从 README.md 读取长描述
long_description_content_type = text/markdown
url = https://github.com/YourGitHubOrg/Xiaoyao-SDK
license = MIT  # 指定许可证类型
license_files = LICENSE  # 指定包含许可证文本的文件
classifiers =
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3.8
    Programming Language :: Python :: 3.9
    Programming Language :: Python :: 3.10
    Programming Language :: Python :: 3.11
    License :: OSI Approved :: MIT License
    Operating System :: OS Independent
    Topic :: Software Development :: Libraries
    Topic :: System :: Hardware :: Hardware Drivers

[options]
# 打包选项
package_dir =
    = src
packages = find:
python_requires = >=3.8
install_requires =
    numpy
    # 其他未来可能需要的依赖，例如：
    # pyserial
    # python-can
    # lxml

[options.packages.find]
# 告诉 find: 在哪里查找包
where = src