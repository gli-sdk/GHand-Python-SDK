[metadata]
# 项目元数据
name = xiaoyao
author = 深圳果力智能科技有限公司
author_email = csi@glitech.com
description = 枭尧灵巧手 Python SDK
long_description = file: README.md
long_description_content_type = text/markdown
url = https://github.com/YourGitHubOrg/Xiaoyao-SDK
license = MIT
license_files = LICENSE

[options]
# 打包选项
packages = find:
python_requires = >=3.10
install_requires =
    pysoem
    netifaces
    setuptools
    sphinx

[options.extras_require]
# 碰撞检测功能（可选）
collision =
    collision_sdk

[options.package_data]
# 碰撞检测数据文件（已由 collision_sdk 包自带）

[options.packages.find]
# 告诉 find: 在哪里查找包
where = src